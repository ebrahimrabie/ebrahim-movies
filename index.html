<!DOCTYPE html>
<html>
<head>
    <title>My Movies</title>

    <style>
        body{
            background-color:#111;
            font-family: Arial, sans-serif;
            color:white;
        }

        h1{
            text-align:center;
        }

        table{
            margin:auto;
            border-spacing:25px;
        }

        td{
            background:#1c1c1c;
            padding:15px;
            border-radius:12px;
            box-shadow:0 5px 20px rgba(0,0,0,0.5);
            transition:0.3s;
            text-align:center;
        }

        td:hover{
            transform:scale(1.07);
        }

        img{
            width:180px;
            height:260px;
            border-radius:8px;
        }

        a{
            display:inline-block;
            margin-top:10px;
            padding:8px 15px;
            background:#e50914;
            color:white;
            text-decoration:none;
            border-radius:20px;
            font-weight:bold;
        }

        a:hover{
            background:white;
            color:black;
        }

        .title{
            margin-top:8px;
            font-size:14px;
            font-weight:bold;
        }
    </style>
</head>

<body>

<h1>🎬  Movies</h1>
<hr width="40%">

<table>

<script>

let movies = [
{
title:"The Dark Knight",
img:"https://upload.wikimedia.org/wikipedia/en/8/8a/Dark_Knight.jpg",
link:"https://www.imdb.com/title/tt0468569/"
},
{
title:"Inception",
img:"https://upload.wikimedia.org/wikipedia/en/7/7f/Inception_ver3.jpg",
link:"https://www.imdb.com/title/tt1375666/"
},
{
title:"Titanic",
img:"https://upload.wikimedia.org/wikipedia/en/2/22/Titanic_poster.jpg",
link:"https://www.imdb.com/title/tt0120338/"
},
{
title:"Joker",
img:"https://upload.wikimedia.org/wikipedia/en/e/e1/Joker_%282019_film%29_poster.jpg",
link:"https://www.imdb.com/title/tt7286456/"
},
{
title:"Interstellar",
img:"https://upload.wikimedia.org/wikipedia/en/b/bc/Interstellar_film_poster.jpg",
link:"https://www.imdb.com/title/tt0816692/"
},
{
title:"El Feel El Azraq",
img:"https://upload.wikimedia.org/wikipedia/en/1/1c/El_Feell_El_Azraq.jpg",
link:"https://www.imdb.com/title/tt3461252/"
},
{
title:"The Yacoubian Building",
img:"https://upload.wikimedia.org/wikipedia/en/9/9f/Omaret_Yacoubian.jpg",
link:"https://www.imdb.com/title/tt0424774/"
},
{
title:"Parasite",
img:"https://upload.wikimedia.org/wikipedia/en/5/53/Parasite_%282019_film%29.png",
link:"https://www.imdb.com/title/tt6751668/"
},
{
title:"The Matrix",
img:"https://upload.wikimedia.org/wikipedia/en/c/c1/The_Matrix_Poster.jpg",
link:"https://www.imdb.com/title/tt0133093/"
},
{
title:"Avengers: Endgame",
img:"https://upload.wikimedia.org/wikipedia/en/0/0d/Avengers_Endgame_poster.jpg",
link:"https://www.imdb.com/title/tt4154796/"
}
];

for(let i = 0; i < movies.length; i++){

    if(i % 5 == 0){
        document.write("<tr>");
    }

    document.write("<td>");
    document.write("<img src='" + movies[i].img + "'>");
    document.write("<div class='title'>" + movies[i].title + "</div>");
    document.write("<a href='" + movies[i].link + "' target='_blank'>Watch</a>");
    document.write("</td>");

    if(i % 5 == 4){
        document.write("</tr>");
    }
}

</script>

</table>

</body>
</html>
